<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積 → エクセル変換</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Meiryo",sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 24px rgba(0,0,0,.08);padding:2.5rem 2rem;width:100%;max-width:640px}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.tab{flex:1;padding:.6rem;border:1.5px solid #d0d0d0;border-radius:8px;background:#fafaf8;cursor:pointer;font-size:.9rem;font-weight:500;text-align:center;color:#555}
.tab.active{border-color:#3b7dd8;background:#eff5ff;color:#1a6fd4}
.drop{border:2px dashed #d0d0d0;border-radius:12px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;background:#fafaf8}
.drop:hover,.drop.over{border-color:#3b7dd8;background:#eff5ff}
#file-input{display:none}
.paste-area{width:100%;height:200px;border:1.5px solid #d0d0d0;border-radius:12px;padding:1rem;font-size:12px;font-family:monospace;resize:vertical;background:#fafaf8;color:#333;line-height:1.8}
.paste-area:focus{outline:none;border-color:#3b7dd8}
.convert-btn{width:100%;margin-top:1rem;padding:.85rem;background:#1a6fd4;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.status{margin-top:1.25rem;background:#f7f7f5;border-radius:10px;padding:1rem 1.25rem;display:none}
.srow{display:flex;align-items:center;gap:.6rem;font-size:.9rem;color:#555;padding:.3rem 0}
.srow.done{color:#2a7a2a}.srow.active{color:#1a1a1a;font-weight:600}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.preview-wrap{display:none;margin-top:1rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f0f0ee;padding:5px 8px;text-align:left;border:.5px solid #ddd;font-weight:500;color:#555}
td{padding:4px 8px;border:.5px solid #ddd;color:#333}
tr:nth-child(even) td{background:#fafaf8}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.25rem;width:100%;padding:.85rem;background:#1a6fd4;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;text-decoration:none}
.reset-btn{display:block;margin:.75rem auto 0;background:none;border:none;color:#aaa;font-size:.82rem;cursor:pointer}
.err{margin-top:1rem;background:#fff5f5;border:1px solid #fcc;border-radius:10px;padding:.85rem 1rem;color:#c0392b;font-size:.88rem;display:none}
#dl-area{display:none}
</style>
</head>
<body>
<div class="card">
  <p style="font-size:1.25rem;font-weight:700;margin-bottom:.25rem">見積 → エクセル変換</p>
  <p style="font-size:.85rem;color:#888;margin-bottom:1.25rem">ＡＡ原紙フォーマットに自動変換</p>
  <div class="tabs">
    <div class="tab active" id="tab-pdf" onclick="switchTab('pdf')">📄 PDFアップロード</div>
    <div class="tab" id="tab-text" onclick="switchTab('text')">📋 テキスト貼り付け</div>
  </div>
  <div id="panel-pdf">
    <div class="drop" id="drop" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".pdf">
      <div style="font-size:2.5rem;margin-bottom:.75rem">📄</div>
      <p style="font-size:1rem;font-weight:600">PDFをここにドロップ</p>
      <p style="font-size:.82rem;color:#aaa;margin-top:.25rem">またはクリックして選択</p>
    </div>
  </div>
  <div id="panel-text" style="display:none">
    <textarea class="paste-area" id="paste-input" placeholder="スマホのOCRでコピーしたテキストをそのまま貼り付けてください。&#10;&#10;1&#10;玄関廊下&#10;壁&#10;クロスクリーニング&#10;1.0&#10;&#10;2000&#10;2&#10;洗面所&#10;..."></textarea>
    <button class="convert-btn" id="convert-btn">エクセルに変換</button>
  </div>
  <div class="status" id="status">
    <div class="srow done"><div class="dot">✓</div><span id="s1t"></span></div>
    <div class="srow active" id="s2"><div class="dot" id="s2d">●</div><span id="s2t">処理中...</span></div>
  </div>
  <div class="preview-wrap" id="preview-wrap">
    <p style="font-size:12px;color:#888;margin-bottom:4px">抽出データプレビュー（先頭10件）</p>
    <table><thead><tr><th>No</th><th>場所</th><th>箇所</th><th>工事項目</th><th>数量</th><th>単位</th><th>単価</th></tr></thead>
    <tbody id="preview-body"></tbody></table>
  </div>
  <div id="dl-area">
    <a class="dl-btn" id="dl-btn">⬇ エクセルをダウンロード</a>
    <button class="reset-btn" id="reset-btn">別の見積を変換する</button>
  </div>
  <div class="err" id="err"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

var UNITS = ["式","㎡","ヶ","ヵ","台","本","枚","ｹ","ケ","組","回"];
function isNum(s){return /^[0-9.]+$/.test(s);}
function isInt(s){return /^[0-9]{1,2}$/.test(s);}
function isUnit(s){return UNITS.indexOf(s)>=0;}
function isMoney(s){return /^[0-9,]+$/.test(s);}

function switchTab(tab){
  document.getElementById("tab-pdf").className=tab==="pdf"?"tab active":"tab";
  document.getElementById("tab-text").className=tab==="text"?"tab active":"tab";
  document.getElementById("panel-pdf").style.display=tab==="pdf"?"":"none";
  document.getElementById("panel-text").style.display=tab==="text"?"":"none";
  resetApp();
}

function resetApp(){
  document.getElementById("status").style.display="none";
  document.getElementById("preview-wrap").style.display="none";
  document.getElementById("dl-area").style.display="none";
  document.getElementById("err").style.display="none";
  document.getElementById("preview-body").innerHTML="";
  var d=document.getElementById("drop");if(d)d.style.display="";
  var f=document.getElementById("file-input");if(f)f.value="";
}

function parseRowsByLine(text){
  var rows=[],seen={};
  var lines=text.split("\n").map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var start=0;
  for(var i=0;i<lines.length;i++){if(isInt(lines[i])&&parseInt(lines[i])===1){start=i;break;}}
  var i=start;
  while(i<lines.length){
    if(!isInt(lines[i])){i++;continue;}
    var no=parseInt(lines[i]);
    if(no<1||no>100||seen[no]){i++;continue;}
    var nextIdx=lines.length;
    for(var j=i+1;j<lines.length;j++){if(isInt(lines[j])&&parseInt(lines[j])===no+1){nextIdx=j;break;}}
    var chunk=lines.slice(i+1,nextIdx);
    var basho="",kasho="",koji="",suryo=null,tani="",tanka=null,ci=0;
    while(ci<chunk.length&&(isNum(chunk[ci])||isUnit(chunk[ci])||isMoney(chunk[ci])))ci++;
    basho=chunk[ci]||"";ci++;
    while(ci<chunk.length&&(isNum(chunk[ci])||isUnit(chunk[ci])||isMoney(chunk[ci])))ci++;
    kasho=chunk[ci]||"";ci++;
    var kp=[];
    while(ci<chunk.length&&!isNum(chunk[ci])&&!isUnit(chunk[ci])&&!isMoney(chunk[ci])){kp.push(chunk[ci]);ci++;}
    koji=kp.join("");
    if(ci<chunk.length&&isNum(chunk[ci])){suryo=parseFloat(chunk[ci]);ci++;}
    if(ci<chunk.length&&isUnit(chunk[ci])){tani=chunk[ci];ci++;}
    if(ci<chunk.length&&isMoney(chunk[ci])){tanka=parseFloat(chunk[ci].replace(/,/g,""));ci++;}
    if(basho){seen[no]=true;rows.push({no:no,basho:basho,kasho:kasho,koji:koji,suryo:suryo,tani:tani,tanka:tanka});}
    i=nextIdx;
  }
  return rows.sort(function(a,b){return a.no-b.no;});
}

function parseRowsFlat(text){
  var rows=[],seen={};
  var idx=text.indexOf("工事項目");
  var use=idx>=0?text.slice(idx):text;
  var tokens=use.replace(/\s+/g," ").trim().split(" ").filter(function(t){return t.length>0;});
  var i=0;
  while(i<tokens.length){
    if(!isInt(tokens[i])){i++;continue;}
    var no=parseInt(tokens[i]);
    if(no<1||no>100||seen[no]){i++;continue;}
    var uIdx=-1;
    for(var j=i+1;j<Math.min(i+15,tokens.length);j++){if(isUnit(tokens[j])){uIdx=j;break;}}
    if(uIdx===-1){i++;continue;}
    var bw=tokens.slice(i+1,uIdx);
    if(bw.length<2){i++;continue;}
    var basho,kasho,koji,suryo=null;
    if(isNum(bw[bw.length-1])){suryo=parseFloat(bw[bw.length-1]);basho=bw[0]||"";kasho=bw[1]||"";koji=bw.slice(2,-1).join("")||"";}
    else{basho=bw[0]||"";kasho=bw[1]||"";koji=bw.slice(2).join("")||"";}
    if(!basho){i++;continue;}
    var tanka=null;
    for(var k=uIdx+1;k<Math.min(uIdx+5,tokens.length);k++){if(isMoney(tokens[k])){tanka=parseFloat(tokens[k].replace(/,/g,""));break;}}
    seen[no]=true;
    rows.push({no:no,basho:basho,kasho:kasho,koji:koji,suryo:suryo,tani:tokens[uIdx],tanka:tanka});
    i=uIdx+1;
  }
  return rows.sort(function(a,b){return a.no-b.no;});
}

function buildAndDownload(rows,fname){
  var buf=Uint8Array.from(atob(TEMPLATE_B64),function(c){return c.charCodeAt(0);});
  var wb=XLSX.read(buf,{type:"array"});
  var ws=wb.Sheets[wb.SheetNames[0]];
  function sc(col,row,val){
    if(!col||val===null||val===undefined||val==="")return;
    var a=col+row;if(!ws[a])ws[a]={};
    ws[a].v=val;ws[a].t=typeof val==="number"?"n":"s";
  }
  for(var ri=0;ri<rows.length;ri++){
    var r=rows[ri],row=r.no+7;
    sc("B",row,r.basho);sc("C",row,r.kasho);sc("D",row,r.koji);
    if(r.suryo!==null)sc("M",row,r.suryo);
    if(r.tani)sc("N",row,r.tani);
    if(r.tanka!==null)sc("O",row,r.tanka);
  }
  var data=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  var blob=new Blob([data],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  var url=URL.createObjectURL(blob);
  var btn=document.getElementById("dl-btn");
  btn.href=url;btn.download=fname+"_変換.xlsx";
  document.getElementById("dl-area").style.display="block";
}

function showPreview(rows){
  var tbody=document.getElementById("preview-body");
  for(var i=0;i<Math.min(rows.length,10);i++){
    var r=rows[i],tr=document.createElement("tr");
    tr.innerHTML="<td>"+r.no+"</td><td>"+r.basho+"</td><td>"+r.kasho+"</td><td>"+r.koji+"</td><td>"+(r.suryo!=null?r.suryo:"")+"</td><td>"+r.tani+"</td><td>"+(r.tanka!=null?r.tanka.toLocaleString():"")+"</td>";
    tbody.appendChild(tr);
  }
  document.getElementById("preview-wrap").style.display="block";
}

function showErr(msg){
  document.getElementById("status").style.display="none";
  var e=document.getElementById("err");e.textContent="⚠ "+msg;e.style.display="block";
}

document.getElementById("convert-btn").addEventListener("click",function(){
  var text=document.getElementById("paste-input").value.trim();
  if(!text){showErr("テキストを貼り付けてください");return;}
  document.getElementById("status").style.display="block";
  document.getElementById("s1t").textContent="テキストを受け取りました";
  document.getElementById("s2t").textContent="解析中...";
  document.getElementById("s2").className="srow active";
  var lc=(text.match(/\n/g)||[]).length;
  var rows=lc>5?parseRowsByLine(text):parseRowsFlat(text);
  if(!rows.length){showErr("見積データが抽出できませんでした");return;}
  document.getElementById("s2").className="srow done";
  document.getElementById("s2d").textContent="✓";
  document.getElementById("s2t").textContent=rows.length+"件抽出しました";
  showPreview(rows);
  buildAndDownload(rows,"見積書");
});

document.getElementById("reset-btn").addEventListener("click",resetApp);

var drop=document.getElementById("drop");
var fi=document.getElementById("file-input");
drop.addEventListener("dragover",function(e){e.preventDefault();drop.classList.add("over");});
drop.addEventListener("dragleave",function(){drop.classList.remove("over");});
drop.addEventListener("drop",function(e){e.preventDefault();drop.classList.remove("over");var f=e.dataTransfer.files[0];if(f)processFile(f);});
fi.addEventListener("change",function(e){if(e.target.files[0])processFile(e.target.files[0]);});

async function processFile(file){
  if(!file.name.toLowerCase().endsWith(".pdf")){showErr("PDFを選択してください");return;}
  drop.style.display="none";
  document.getElementById("status").style.display="block";
  document.getElementById("s1t").textContent=file.name+" を読み込みました";
  document.getElementById("s2").className="srow active";
  document.getElementById("s2t").textContent="テキスト抽出中...";
  try{
    var ab=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:ab}).promise;
    var allText="";
    for(var i=1;i<=pdf.numPages;i++){
      var page=await pdf.getPage(i);
      var tc=await page.getTextContent();
      allText+=tc.items.map(function(x){return x.str;}).join(" ")+" ";
    }
    if(allText.trim().length<50){throw new Error("スキャンPDFです。「テキスト貼り付け」タブをご利用ください。");}
    var rows=parseRowsFlat(allText);
    if(!rows.length)throw new Error("見積データが抽出できませんでした");
    document.getElementById("s2").className="srow done";
    document.getElementById("s2d").textContent="✓";
    document.getElementById("s2t").textContent=rows.length+"件抽出しました";
    showPreview(rows);
    buildAndDownload(rows,file.name.replace(".pdf",""));
  }catch(e){drop.style.display="";showErr(e.message);}
}
</script>
